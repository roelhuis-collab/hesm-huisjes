# Cloud Build pipeline for the HESM optimizer.
#
# Triggered manually (`gcloud builds submit`) for now. PR5 wires this into a
# GitHub-push trigger once the first manual deploy works end-to-end.
#
# To deploy:
#   gcloud builds submit --config=cloudbuild.yaml apps/optimizer

substitutions:
  _REGION: europe-west4
  _SERVICE_NAME: hesm-optimizer
  _SA: hesm-optimizer@hesm-huisjes.iam.gserviceaccount.com
  _AR_REPO: hesm

steps:
  # 1. Build the container image (tagged with build id + latest).
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .
    dir: .

  # 2. Push both tags to Artifact Registry.
  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}"]

  # 3. Deploy to Cloud Run with the dedicated runtime SA + secrets.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      # Public ingress; auth is enforced in the app (OIDC for Scheduler,
      # Firebase ID token for users — see verify_scheduler_token in main.py).
      - --allow-unauthenticated
      - --concurrency=20
      - --max-instances=2
      - --min-instances=0
      - --cpu=1
      - --memory=512Mi
      - --timeout=60s
      - --set-env-vars=DASHBOARD_BASE_URL=https://hesm-huisjes.netlify.app,GCP_PROJECT=${PROJECT_ID},SCHEDULER_ALLOWED_EMAILS=hesm-scheduler@${PROJECT_ID}.iam.gserviceaccount.com,HESM_ENV=production
      - --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,SENTRY_DSN=sentry-dsn:latest

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
